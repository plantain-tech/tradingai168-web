name: Deploy dashboard to Hostinger (FTP)

# Auto-deploys on every push to main — independent of Hostinger's built-in Git
# slot (which is used by the main site). Only changed files are uploaded.

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you trigger a deploy manually from the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server:   ${{ secrets.FTP_SERVER }}      # e.g. ftp.kaptainone.com  (from hPanel FTP Accounts)
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Target = the subdomain's document root. Adjust if your FTP account's
          # home already starts inside public_html (we'll confirm on first run).
          server-dir: public_html/tradingai168/
          # Never touch the server's real secrets or CI metadata.
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            config/config.php
            .gitignore
            README.md
