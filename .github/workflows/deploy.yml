name: Deploy dashboard to Hostinger (FTP)

# Auto-deploys on every push to main, independent of Hostinger's built-in Git slot.
# Uses lftp (robust directory handling) instead of actions that trip over MKD/CWD
# on Hostinger's FTP server.

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Strip non-deploy files
        run: rm -rf .git .github .gitignore README.md   # never ship these

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via lftp mirror
        env:
          FTP_SERVER:   ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -c "
          set ftp:ssl-allow false;
          set ftp:passive-mode true;
          set net:max-retries 2;
          set net:timeout 15;
          open -u '$FTP_USERNAME','$FTP_PASSWORD' '$FTP_SERVER';
          mirror --reverse --verbose --ignore-time --parallel=2 \
                 --exclude 'config/config\.php' \
                 ./ ./;
          "
